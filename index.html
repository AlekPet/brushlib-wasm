<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brushlib</title>
    <style>
      body {
        margin: 0;
        padding: 0;

        background-image: url("./docs/background.png");
        background-repeat: repeat;
      }
      .boxCanvases {
        display: flex;
        gap: 5px;
        padding: 15px;
        justify-content: flex-start;
        align-items: flex-start;
      }
      canvas {
        border: 1px solid silver;
      }
      .title-canvas::before {
        content: attr(canv-name);
        position: fixed;
        color: #5a0000;
        font-family: monospace;
        text-transform: uppercase;
        font-weight: 600;
        top: 0%;
      }
      .boxControl {
        background: rgb(172 182 199 / 68%);
        position: fixed;
        top: 15px;
        width: 200px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 5px;
        left: 930px;
        text-align: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="boxCanvases">
      <div class="title-canvas" canv-name="Painter (WASM)" style="width: 65%">
        <canvas id="canvas2"></canvas>
      </div>
      <div class="title-canvas" canv-name="Brushes">
        <canvas id="canvas1"></canvas>
      </div>
    </div>
    <script src="./docs/brushlib.js"></script>
    <script src="./docs/brushes.js"></script>
    <script src="./docs/index.js"></script>
  </body>
</html>
